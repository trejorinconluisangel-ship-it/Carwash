{% extends 'base.html' %}
{% block title %}Eliminar {{ tipo }}{% endblock %}

{% block content %}
<div style="max-width:480px; margin:60px auto;">
  <div class="card" style="border-color:rgba(255,61,113,0.4); text-align:center; padding:32px 24px;">
    <div style="font-size:3rem; margin-bottom:16px;">⚠️</div>
    <h2 style="color:var(--red); margin-bottom:8px;">Eliminar {{ tipo }}</h2>
    <p class="text-muted" style="margin-bottom:24px;">
      ¿Seguro que quieres eliminar <strong style="color:var(--text);">{{ obj }}</strong>?
      Esta acción no se puede deshacer.
    </p>
    <form method="post">
      {% csrf_token %}
      <div class="d-flex gap-1" style="justify-content:center;">
        <a href="javascript:history.back()" class="btn btn-outline">Cancelar</a>
        <button type="submit" class="btn btn-danger">Sí, eliminar</button>
      </div>
    </form>
  </div>
</div>
{% endblock %}
