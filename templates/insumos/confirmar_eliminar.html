{% extends 'base.html' %}
{% block title %}Confirmar eliminación{% endblock %}

{% block content %}
<div style="max-width:500px; margin:80px auto; text-align:center;">
  <div class="card card-orange">
    <div style="font-size:3rem; margin-bottom:16px;">⚠️</div>
    <h2 style="color:var(--orange); margin-bottom:8px;">¿Eliminar {{ tipo }}?</h2>
    <p class="text-muted mb-3">
      Estás a punto de eliminar: <strong class="text-cyan">{{ obj }}</strong>.<br>
      Esta acción no se puede deshacer.
    </p>
    <form method="post" style="display:inline-flex; gap:12px; justify-content:center;">
      {% csrf_token %}
      <button type="submit" class="btn btn-danger">Sí, eliminar</button>
      <a href="javascript:history.back()" class="btn btn-outline">Cancelar</a>
    </form>
  </div>
</div>
{% endblock %}
